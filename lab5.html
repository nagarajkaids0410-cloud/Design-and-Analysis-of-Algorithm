<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAA Lab 5 - Min Max (Divide & Conquer)</title>

<style>
body{
    font-family:Arial;
    background:#f5f7fa;
    margin:40px;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    color:#0d47a1;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:20px;
    font-size:16px;
}

button{
    background:#1976d2;
    color:white;
    border:none;
    padding:12px 25px;
    cursor:pointer;
    border-radius:5px;
    font-size:16px;
}

button:hover{
    background:#1565c0;
}

#output{
    margin-top:25px;
    background:#eeeeee;
    padding:15px;
    border-radius:8px;
    white-space:pre-wrap;
}
</style>

</head>
<body>

<div class="container">

<h1>Divide & Conquer - Min Max</h1>

<label>Enter Array Elements (space separated)</label>

<input type="text" id="arr" placeholder="3 1 7 4 9 2 8 5 6 0">

<button onclick="runProgram()">Run Algorithm</button>

<div id="output"></div>

</div>

<script>

function minMax(arr){

function solve(low,high){

if(low==high)
return {min:arr[low],max:arr[low],comp:0};

if(high==low+1){

let c=1;

if(arr[low]<arr[high])
return {min:arr[low],max:arr[high],comp:c};

return {min:arr[high],max:arr[low],comp:c};

}

let mid=Math.floor((low+high)/2);

let left=solve(low,mid);

let right=solve(mid+1,high);

let comp=left.comp+right.comp+2;

return{

min:Math.min(left.min,right.min),

max:Math.max(left.max,right.max),

comp:comp

};

}

return solve(0,arr.length-1);

}

function runProgram(){

let arr=document.getElementById("arr").value
.trim()
.split(/\s+/)
.map(Number);

if(arr.length==0 || isNaN(arr[0])){

alert("Enter valid numbers");
return;

}

let ans=minMax(arr);

document.getElementById("output").innerHTML=

"Input Array : "+arr.join(" ")+"\n\n"+
"Minimum Element : "+ans.min+"\n"+
"Maximum Element : "+ans.max+"\n"+
"Comparisons : "+ans.comp;

}

</script>

</body>
</html>
